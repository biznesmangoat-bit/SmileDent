<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinet Dentystyczny</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <div class="logo">SmileDent</div>

    <ul>
        <li><a href="#o-nas">O nas</a></li>
        <li><a href="#cennik">Cennik</a></li>
        <li><a href="#rezerwacja">Rezerwacja</a></li>
    </ul>
</nav>
    <header>
        <h1>Gabinet Dentystyczny</h1>
        <p>Zdrowy uśmiech każdego dnia</p>

        <button id="umowBtn">
            Umów wizytę
        </button>
    </header>

    <section id="o-nas">
        <h2>O nas</h2>
        <p>
            Profesjonalna opieka stomatologiczna dla dzieci i dorosłych.
        </p>
    </section>

    <section id="cennik">
        <h2>Cennik</h2>

        <div class="usluga">
            <span>Przegląd stomatologiczny</span>
            <strong>150 zł</strong>
        </div>

        <div class="usluga">
            <span>Usunięcie kamienia</span>
            <strong>250 zł</strong>
        </div>

        <div class="usluga">
            <span>Leczenie kanałowe</span>
            <strong>600 zł</strong>
        </div>
    </section>

    <section id="rezerwacja">
        <h2>Umów wizytę</h2>

        <input type="text" placeholder="Imię i nazwisko">
        <input type="date">
        <input type="time">

        <button>Zarezerwuj</button>
    </section>

    <script src="script.js"></script>

</body>
</html>
